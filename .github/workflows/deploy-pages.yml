# Deploys the site to GitHub Pages.
#
# Inert until you enable it: repo Settings → Pages → Source: "GitHub Actions".
# Serves from the project subpath (https://<user>.github.io/jolene-site/) by
# default via BASE_PATH below. Once the custom domain is live, set the repo
# variable BASE_PATH to "/" — see README "Option B — GitHub Pages".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true
      - name: Build site
        uses: withastro/action@v6
        with:
          node-version: 22
        env:
          # canonical URL baked into the build (og tags etc.)
          SITE_URL: ${{ vars.SITE_URL || 'https://www.jolenemallendesigns.com' }}
          # Defaults to the project-page subpath so the site works at
          # https://<user>.github.io/jolene-site/ out of the box. Once the
          # custom domain is live (DNS + Settings → Pages → Custom domain),
          # set the repo variable BASE_PATH to "/" to serve from root.
          BASE_PATH: ${{ vars.BASE_PATH || '/jolene-site' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
